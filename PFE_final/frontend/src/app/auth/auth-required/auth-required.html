<div class="auth-required-container d-flex align-items-center justify-content-center min-vh-100 bg-soft-light">
    <div class="card shadow-lg border-0 rounded-4 p-5 text-center auth-card">
        <div class="icon-container mb-4 mx-auto">
            <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3.5rem;"></i>
        </div>
        <h2 class="fw-bold mb-3 text-dark">{{ 'AUTH_REQUIRED.TITLE' | translate }}</h2>
        <p class="text-muted mb-4 fs-5 px-md-3">
            {{ 'AUTH_REQUIRED.MESSAGE' | translate }}
        </p>
        <div class="d-grid gap-3 d-sm-flex justify-content-sm-center mt-4">
            <a routerLink="/auth/login" [queryParams]="{returnUrl: returnUrl}"
                class="btn btn-primary px-4 rounded-pill shadow-sm d-flex align-items-center justify-content-center text-nowrap" style="font-size: 0.95rem;">
                <i class="bi bi-box-arrow-in-right me-2"></i> {{ 'AUTH_REQUIRED.LOG_IN' | translate }}
            </a>
            <a routerLink="/auth/register"
                class="btn btn-outline-primary px-4 rounded-pill d-flex align-items-center justify-content-center text-nowrap" style="font-size: 0.95rem;">
                <i class="bi bi-person-plus me-2"></i> {{ 'AUTH_REQUIRED.CREATE_ACCOUNT' | translate }}
            </a>
        </div>
        <div class="mt-4 pt-3 border-top">
            <a routerLink="/" class="text-decoration-none text-muted small">
                <i class="bi bi-arrow-left me-1"></i> {{ 'AUTH_REQUIRED.RETURN_HOME' | translate }}
            </a>
        </div>
    </div>
</div>
